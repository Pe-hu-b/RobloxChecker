<!DOCTYPE html>
<html>
<head>
<title>Roblox Admin Panel</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: #1e293b;
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
    width: 200px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: #334155;
}
</style>
</head>

<body>

<h1>🔥 Roblox Admin Panel</h1>
<h2 id="status">No player selected</h2>

<div class="container" id="players"></div>

<script>
const socket = io();

socket.on("update", (data) => {
    render(data);
});

socket.on("select", (id) => {
    document.getElementById("status").innerText = "Selected: " + id;
});

function render(data) {
    const container = document.getElementById("players");
    container.innerHTML = "";

    data.forEach(p => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${p.username}</h3>
            <img src="https://www.roblox.com/headshot-thumbnail/image?userId=${p.userId}&width=150&height=150&format=png">
            <p>ID: ${p.userId}</p>
        `;

        div.onclick = () => {
            fetch("/select-player", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userId: p.userId })
            });
        };

        container.appendChild(div);
    });
}
</script>

</body>
</html>
