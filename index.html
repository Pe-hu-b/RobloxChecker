<!DOCTYPE html>
<html>
<head>
<title>Roblox Admin Panel</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
body { background: #0f172a; color: white; font-family: Arial; text-align: center; }
button { padding: 10px 20px; margin: 10px; border-radius: 8px; border: none; background: #5865F2; color: white; cursor: pointer; }
.container { display: flex; flex-wrap: wrap; justify-content: center; }
.card { background: #1e293b; margin: 10px; padding: 15px; border-radius: 12px; width: 200px; cursor: pointer; transition: 0.3s; }
.card:hover { transform: scale(1.05); background: #334155; }
</style>
</head>
<body>
<h1>🔥 Roblox Admin Panel</h1>
<div id="auth"><h2>Loading...</h2></div>
<div id="panel" style="display:none;">
    <h2 id="user"></h2>
    <button onclick="logout()">Logout</button>
    <h2 id="status">No player selected</h2>
    <div class="container" id="players"></div>
</div>
<script>
let selected = null

fetch("/me")
.then(res => { if (!res.ok) throw new Error(); return res.json() })
.then(user => {
    if (!user) {
        document.getElementById("auth").innerHTML = '<button onclick="login()">Login with Discord</button>'
        return
    }
    if (!user.admin) {
        document.getElementById("auth").innerHTML = "<h1>Access Denied</h1>"
        return
    }
    document.getElementById("auth").style.display = "none"
    document.getElementById("panel").style.display = "block"
    document.getElementById("user").innerText = "Logged in as: " + user.username
    initSocket()
})
.catch(() => {
    document.getElementById("auth").innerHTML = '<button onclick="login()">Login with Discord</button>'
})

function login() { window.location.href = "/auth/discord" }
function logout() { window.location.href = "/logout" }

function initSocket() {
    const socket = io()
    const container = document.getElementById("players")
    const status = document.getElementById("status")
    socket.on("update", (data) => {
        container.innerHTML = ""
        data.forEach(p => {
            const div = document.createElement("div")
            div.className = "card"
            div.innerHTML = `<h3>${p.username}</h3><img src="https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${p.userId}&size=150x150&format=Png&isCircular=false"><p>ID: ${p.userId}</p>`
            div.onclick = () => fetch("/select-player", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ userId: p.userId }) })
            container.appendChild(div)
        })
    })
    socket.on("select", (id) => { selected = id; status.innerText = "Selected: " + id })
}
</script>
</body>
</html>
